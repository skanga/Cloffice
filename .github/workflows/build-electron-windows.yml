name: build-electron-windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (optional for manual runs)"
        required: false
        type: string
  push:
    tags:
      - "*"
  release:
    types:
      - published
      - prereleased

permissions:
  contents: write

concurrency:
  group: build-electron-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release verification
        run: npm run verify:release

      - name: Build and package app
        run: npm run package -- --publish never

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relay-windows-installer-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.event.inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to resolve release tag for upload."
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }

          gh release upload $tag release/*.exe release/*.blockmap release/latest.yml --clobber
